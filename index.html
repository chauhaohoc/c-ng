<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gửi Cục Dàng 💗</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at top,#1b0024,#000);
color:white;
overflow:hidden;
}

/* stars */

.star{
position:fixed;
width:2px;
height:2px;
background:white;
opacity:.8;
animation:twinkle 4s infinite alternate;
}

@keyframes twinkle{
from{opacity:.2}
to{opacity:1}
}

/* cursor */

.cursor{
width:20px;
height:20px;
border-radius:50%;
background:pink;
position:fixed;
pointer-events:none;
filter:blur(6px);
z-index:999;
}

/* center */

.center{
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
text-align:center;
}

.hidden{
display:none;
}

/* title */

.title{
font-size:64px;
color:#ff8fbd;
text-shadow:
0 0 15px #ff8fbd,
0 0 40px #ff4da6,
0 0 80px #ff4da6;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* buttons */

.btn{
margin-top:20px;
padding:14px 36px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#ff4da6,#ff8fbd);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 20px #ff4da6;
transition:.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* victory */

.victory{
font-size:40px;
margin-top:20px;
animation:pop 1s forwards;
}

@keyframes pop{
0%{transform:scale(.3);opacity:0}
100%{transform:scale(1);opacity:1}
}

/* gift */

.giftBox{
width:160px;
height:160px;
position:relative;
margin-top:40px;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

.gift-base{
width:160px;
height:120px;
background:#ff4da6;
position:absolute;
bottom:0;
border-radius:12px;
}

.gift-lid{
width:160px;
height:45px;
background:#ff8fbd;
position:absolute;
top:0;
border-radius:12px;
transform-origin:bottom;
transition:.7s;
}

.ribbon{
width:20px;
height:160px;
background:white;
position:absolute;
left:70px;
}

.giftBox.open .gift-lid{
transform:rotateX(-120deg);
}

/* letter */

.letter{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%) scale(0);
width:520px;
padding:40px;
background:rgba(255,192,203,0.15);
backdrop-filter:blur(25px);
border-radius:25px;
box-shadow:0 0 30px pink;
transition:.8s;
}

.letter.show{
transform:translate(-50%,-50%) scale(1);
}

.letter h1{
color:#ff8fbd;
font-size:36px;
}

/* hearts */

.heart{
position:fixed;
font-size:22px;
animation:heartFloat 6s linear forwards;
}

@keyframes heartFloat{
0%{transform:translateY(0);opacity:1}
100%{transform:translateY(-800px);opacity:0}
}

/* petals */

.petal{
position:fixed;
font-size:20px;
animation:fall 8s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(900px)}
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_6a7dc3e1f5.mp3">
</audio>

<!-- QUIZ -->

<div id="quiz" class="center">

<div class="title">💖 Học có đẹp trai không? 💖</div>

<button class="btn wrong" onmouseover="moveButton(this)">Đéo</button>
<button class="btn wrong" onmouseover="moveButton(this)">Hơi hơi</button>
<button class="btn" onclick="correct()">HỌC ĐẸP TRAI SỐ 1💗</button>

<div id="victoryText"></div>

</div>

<!-- MAIN -->

<div id="main" class="center hidden">

<div class="title">🌸 Happy Women's Day Cưng 🌸</div>

<div class="giftBox" onclick="openGift()">

<div class="gift-base"></div>
<div class="gift-lid"></div>
<div class="ribbon"></div>

</div>

<button id="openLetter" class="btn hidden" onclick="showLetter()">💌 Mở thư</button>

</div>

<!-- LETTER -->

<div id="letter" class="letter">

<h1>💗 Gửi Cục Dàng 💗</h1>

<p id="typing"></p>

</div>

<script>

/* cursor */

const cursor=document.getElementById("cursor")

document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"
})

/* stars */

for(let i=0;i<120;i++){
const star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
star.style.animationDuration=2+Math.random()*4+"s"
document.body.appendChild(star)
}

/* wrong answer */

function moveButton(btn){

let x=Math.random()*(window.innerWidth-150)
let y=Math.random()*(window.innerHeight-100)

btn.style.position="fixed"
btn.style.left=x+"px"
btn.style.top=y+"px"

}

/* correct */

function correct(){

fireworks()

document.getElementById("victoryText").innerHTML=
'<div class="victory">🎉Cưng thông minh đấy😏</div>'

setTimeout(()=>{
document.getElementById("quiz").classList.add("hidden")
document.getElementById("main").classList.remove("hidden")
},2000)

}

/* fireworks */

function fireworks(){

for(let i=0;i<60;i++){

const spark=document.createElement("div")

spark.style.position="fixed"
spark.style.width="6px"
spark.style.height="6px"
spark.style.background="white"
spark.style.left="50%"
spark.style.top="50%"
spark.style.borderRadius="50%"

let x=(Math.random()-0.5)*800
let y=(Math.random()-0.5)*800

spark.animate(
[
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],
{duration:1500}
)

document.body.appendChild(spark)

setTimeout(()=>spark.remove(),1500)

}

}

/* gift */

function openGift(){

document.querySelector(".giftBox").classList.add("open")

document.getElementById("openLetter").classList.remove("hidden")

spawnHearts()

}

/* message */

const message=`Chúc cưng một ngày 8/3 thật hạnh phúc 💗

Chúc cưng luôn nở nụ cười mỗi ngày, luôn dễ thương và xinh đẹp cưng nhó,
Mong rằng không chỉ hôm nay mà mỗi ngày trong cuộc sống của bạn đều tràn ngập tiếng cười, niềm vui và những điều tốt đẹp.
Tái bút:
CHÚC CƯNG LUÔN TỰ TIN THEO ĐUỔI ƯỚC MƠ CỦA MÌNH VÀ GẶT HÁI ĐƯỢC NHÌU QUẢ NGỌT NHÓ ✌️💖😉`

function typeWriter(text,element){

let i=0

function typing(){
if(i<text.length){
element.innerHTML+=text.charAt(i)
i++
setTimeout(typing,40)
}
}

typing()

}

function showLetter(){

document.getElementById("music").play()

document.getElementById("letter").classList.add("show")

typeWriter(message,document.getElementById("typing"))

spawnHearts()
spawnPetals()

}

/* hearts */

function spawnHearts(){

for(let i=0;i<25;i++){

const heart=document.createElement("div")

heart.innerHTML="💖"
heart.className="heart"

heart.style.left=Math.random()*100+"vw"
heart.style.bottom="0"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

}

}

/* petals */

function spawnPetals(){

for(let i=0;i<30;i++){

const petal=document.createElement("div")

petal.innerHTML="🌸"
petal.className="petal"

petal.style.left=Math.random()*100+"vw"

document.body.appendChild(petal)

setTimeout(()=>petal.remove(),8000)

}

}

/* floating hearts */

setInterval(()=>{

const heart=document.createElement("div")

heart.innerHTML="💗"
heart.className="heart"

heart.style.left=Math.random()*100+"vw"
heart.style.bottom="-20px"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},800)

</script>

</body>
</html>
